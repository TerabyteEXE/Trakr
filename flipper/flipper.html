<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipper | Terabyte_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Coin Animation */
        .coin-spin { animation: spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes spin {
            0% { transform: scale(1) rotateY(0deg); }
            50% { transform: scale(1.1) rotateY(180deg); }
            100% { transform: scale(1) rotateY(360deg); }
        }

        .history-badge {
            border: 1px solid var(--te-border);
            padding: 2px 6px;
            font-size: 10px;
        }
        .history-badge.heads {
            background: var(--te-orange);
            color: white;
            border-color: var(--te-orange);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="te-grid w-full max-w-sm">
        <header class="te-panel !min-h-0 border-b-0">
            <div class="flex justify-between items-start w-full">
                <div>
                    <p class="label">Random_Gen</p>
                    <h1 class="text-xl font-bold">COIN_FLIP</h1>
                    <p class="label mt-1">Binary Outcome Protocol</p>
                </div>
                <a href="../index.html" class="te-key" title="Return Home">←</a>
            </div>
        </header>

        <div class="te-panel aspect-square flex flex-col justify-center items-center">
            <div id="coin-visual" class="w-32 h-32 rounded-full border-4 border-[var(--te-border)] flex items-center justify-center transition-colors">
                <span id="coin-text" class="text-2xl font-bold uppercase">READY</span>
            </div>
        </div>

        <div class="te-panel !min-h-0 bg-neutral-200">
            <div class="flex justify-between items-center">
                <div>
                    <p class="label">Trigger</p>
                    <p class="value">Execute_Flip</p>
                </div>
                <button onclick="flipCoin()" class="te-key orange !w-24 !h-10 !rounded-md">FLIP</button>
            </div>
        </div>

        <div class="te-panel !min-h-0">
            <p class="label mb-3">Flip_History (Last 12)</p>
            <div id="flip-history" class="flex gap-1.5 flex-wrap font-mono">
                <p class="text-[10px] opacity-30 italic">No logs found...</p>
            </div>
        </div>
    </div>

    <script>
        let history = [];

        function flipCoin() {
            const visual = document.getElementById('coin-visual');
            const text = document.getElementById('coin-text');
            const historyContainer = document.getElementById('flip-history');

            // Reset and Trigger Animation
            visual.classList.remove('coin-spin');
            void visual.offsetWidth; // Force DOM reflow
            visual.classList.add('coin-spin');

            text.innerText = "...";

            setTimeout(() => {
                const isHeads = Math.random() > 0.5;
                const result = isHeads ? 'HEADS' : 'TAILS';
                const shortResult = isHeads ? 'H' : 'T';
                
                text.innerText = result;
                
                // Update history array
                history.unshift(shortResult);
                if (history.length > 12) history.pop();
                
                // Render history items
                historyContainer.innerHTML = history.map(item => 
                    `<span class="history-badge ${item === 'H' ? 'heads' : ''}">${item}</span>`
                ).join('');
            }, 600);
        }

        // Maintain theme consistency
        const currentTheme = localStorage.getItem('te_theme');
        if (currentTheme === 'dark') document.body.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
