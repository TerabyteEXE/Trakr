<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault_Key | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom slider styling to fit the TE aesthetic */
        input[type=range] { appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { background: var(--te-border); height: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            appearance: none; 
            height: 18px; width: 18px; 
            background: var(--te-bg); 
            border: 2px solid var(--te-border); 
            border-radius: 50%;
            margin-top: -8px; 
            cursor: pointer;
        }
        .output-display {
            background: var(--te-bg);
            border: 1px solid var(--te-border);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            word-break: break-all;
            padding: 1rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="te-grid w-full max-w-md">
        <header class="te-panel !min-h-0 border-b-0">
            <div class="flex justify-between items-start w-full">
                <div>
                    <p class="label">Security_Tool</p>
                    <h1 class="text-xl font-bold">VAULT_KEY</h1>
                    <p class="label mt-1">Entropy Generation Protocol</p>
                </div>
                <a href="/Trakr/index.html" class="te-key" title="Return Home">←</a>
            </div>
        </header>

        <div class="te-panel">
            <div>
                <p class="label">Current_Key</p>
                <div class="output-display font-bold mb-2" id="output">********</div>
            </div>
            <div class="flex justify-between items-end">
                <p class="label" id="status">Status: Standby</p>
                <button onclick="copyToClipboard()" class="te-key" title="Copy to Buffer">⎘</button>
            </div>
        </div>

        <div class="te-panel bg-neutral-200">
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between mb-2">
                        <p class="label">Complexity</p>
                        <p class="value" id="lengthVal">16</p>
                    </div>
                    <input type="range" id="length" min="8" max="32" value="16">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="symbols" checked class="accent-[#ff4d00]">
                        <span class="label !opacity-100">Symbols</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="numbers" checked class="accent-[#ff4d00]">
                        <span class="label !opacity-100">Numbers</span>
                    </label>
                </div>
            </div>

            <div class="mt-8">
                <button onclick="generate()" class="te-key orange w-full !rounded-md !h-12 !w-full text-sm">GENERATE_KEY</button>
            </div>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const lengthInput = document.getElementById('length');
        const lengthVal = document.getElementById('lengthVal');
        const statusText = document.getElementById('status');

        lengthInput.oninput = () => lengthVal.innerText = lengthInput.value;

        function generate() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ" + 
                (document.getElementById('numbers').checked ? "0123456789" : "") +
                (document.getElementById('symbols').checked ? "!@#$%^&*()_+~" : "");
            
            let retVal = "";
            for (let i = 0; i < lengthInput.value; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            let iterations = 0;
            statusText.innerText = "Status: Encrypting...";
            
            const interval = setInterval(() => {
                output.innerText = retVal.split("")
                    .map((char, index) => {
                        if(index < iterations) return retVal[index];
                        return charset[Math.floor(Math.random() * charset.length)]
                    })
                    .join("");
                
                if(iterations >= retVal.length) {
                    clearInterval(interval);
                    statusText.innerText = "Status: Ready";
                }
                iterations += 1 / 3;
            }, 30);
        }

        function copyToClipboard() {
            if (output.innerText === "********") return;
            navigator.clipboard.writeText(output.innerText);
            const originalText = output.innerText;
            output.innerText = "COPIED_TO_BUFFER";
            setTimeout(() => output.innerText = originalText, 1000);
        }

        // Theme persistent logic
        const currentTheme = localStorage.getItem('te_theme');
        if (currentTheme === 'dark') document.body.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
