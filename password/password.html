<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault_Key | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --card: #ffffff; --text: #000000; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --card: #1a1a1a; --text: #ffffff; --border: #ffffff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.2s; }
        .blocky-card { background: var(--card); border: 4px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
        
        .btn-link { 
            background: var(--text); 
            color: var(--bg); 
            border: 2px solid var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: all 0.1s; 
            display: inline-block;
            text-align: center;
        }
        .btn-link:hover { background: var(--bg); color: var(--text); }
        
        .output-box {
            background: rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
        }
        [data-theme='dark'] .output-box { background: rgba(255,255,255,0.05); }

        /* Custom range styling to match the theme */
        input[type=range] { appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: var(--text); height: 4px; }
        input[type=range]::-webkit-slider-thumb { 
            appearance: none; 
            height: 20px; width: 10px; 
            background: var(--bg); 
            border: 2px solid var(--text); 
            margin-top: -8px; 
        }
    </style>
</head>
<body class="p-8 flex items-center justify-center min-h-screen">

    <div class="blocky-card p-8 w-full max-w-md">
        <header class="mb-8 border-b-4 border-[var(--border)] pb-4 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black italic">VAULT_KEY</h1>
                <p class="font-mono text-[10px] uppercase opacity-50 mt-1">Entropy Generation Protocol</p>
            </div>
            <a href="index.html" class="btn-link !py-1 !px-3 text-[10px] mt-1 whitespace-nowrap">Home_Exit</a>
        </header>

        <div class="output-box p-6 mb-6 text-center break-all text-xl font-bold min-h-[80px] flex items-center justify-center" id="output">
            ********
        </div>

        <div class="space-y-4 font-mono text-sm uppercase">
            <div class="flex justify-between items-center gap-4">
                <label class="whitespace-nowrap">Complexity</label>
                <input type="range" id="length" min="8" max="32" value="16" class="w-full">
                <span id="lengthVal" class="min-w-[20px]">16</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="symbols" checked class="accent-black"> Symbols
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="numbers" checked class="accent-black"> Numbers
                </label>
            </div>
        </div>

        <button onclick="generate()" class="btn-link w-full py-4 mt-8 text-xl">Generate_Key</button>
        <button onclick="copyToClipboard()" class="w-full mt-4 text-[10px] font-mono uppercase opacity-50 hover:opacity-100 transition-opacity">Copy_to_Buffer</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const lengthInput = document.getElementById('length');
        const lengthVal = document.getElementById('lengthVal');

        lengthInput.oninput = () => lengthVal.innerText = lengthInput.value;

        function generate() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ" + 
                (document.getElementById('numbers').checked ? "0123456789" : "") +
                (document.getElementById('symbols').checked ? "!@#$%^&*()_+~" : "");
            
            let retVal = "";
            for (let i = 0; i < lengthInput.value; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            
            // Scramble effect
            let iterations = 0;
            const interval = setInterval(() => {
                output.innerText = retVal.split("")
                    .map((char, index) => {
                        if(index < iterations) return retVal[index];
                        return charset[Math.floor(Math.random() * charset.length)]
                    })
                    .join("");
                
                if(iterations >= retVal.length) clearInterval(interval);
                iterations += 1 / 3;
            }, 30);
        }

        function copyToClipboard() {
            if (output.innerText === "********") return;
            navigator.clipboard.writeText(output.innerText);
            const originalText = output.innerText;
            output.innerText = "COPIED_TO_BUFFER";
            setTimeout(() => output.innerText = originalText, 1000);
        }

        // Apply theme from global storage
        const theme = localStorage.getItem('dg_theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
</body>
</html>
