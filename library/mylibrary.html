<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library_DB | Terabyte_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Custom Table Styling for TE Aesthetic */
        .te-table-header {
            border-bottom: 1px solid var(--te-border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .book-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 120px;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--te-border);
            align-items: center;
        }
        .book-row:last-child { border-bottom: none; }
        
        #search-input {
            width: 100%;
            background: var(--te-bg);
            border: 1px solid var(--te-border);
            padding: 10px;
            color: var(--te-text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            outline: none;
        }
        #search-input:focus { border-color: var(--te-orange); }
    </style>
</head>
<body>

    <header>
        <div>
            <p class="label">System Version: 1.8.2</p>
            <h1 class="text-xl font-bold">LIBRARY_ARCHIVE // DATA</h1>
        </div>
        <div class="flex gap-4">
            <div class="text-right">
                <p class="label">Total_Records</p>
                <p class="value" id="count-target">000</p>
            </div>
            <button class="te-key orange" onclick="toggleTheme()" aria-label="Toggle Theme"></button>
        </div>
    </header>

    <main class="te-grid">
        <div class="te-panel h-auto min-h-0">
            <div>
                <p class="label">Search_Parameter</p>
                <input type="text" id="search-input" onkeyup="filter()" placeholder="TYPE_TO_FILTER...">
            </div>
        </div>

        <div class="te-panel md:col-span-2">
            <div>
                <p class="label">Collection_Index</p>
                <div class="te-table-header book-row text-[10px] font-bold opacity-50 uppercase">
                    <div>Title</div>
                    <div>Author</div>
                    <div>ISBN</div>
                </div>
                <div id="list-target" class="text-[12px]">
                    Loading_Archive...
                </div>
            </div>
            
            <div class="flex justify-between items-end mt-4">
                <p class="label">Mode: Read_Only</p>
                <a href="../index.html" class="te-key" title="Return Home">←</a>
            </div>
        </div>
    </main>

    <footer class="flex gap-10">
        <div>
            <p class="label">Source</p>
            <p class="text-[10px] mt-1">library.json</p>
        </div>
        <div>
            <p class="label">Encoding</p>
            <p class="text-[10px] mt-1">UTF-8 // JSON</p>
        </div>
    </footer>

    <script>
        let books = [];

        async function init() {
            try {
                const resp = await fetch('library.json');
                books = await resp.json();
                document.getElementById('count-target').innerText = books.length.toString().padStart(3, '0');
                render(books);
            } catch (e) {
                document.getElementById('list-target').innerText = "FAILED_TO_LOAD_JSON";
            }
        }

        function render(data) {
            document.getElementById('list-target').innerHTML = data.map(b => `
                <div class="book-row">
                    <div class="font-bold truncate">${b.title}</div>
                    <div class="opacity-70 truncate">${b.author}</div>
                    <div class="label !mb-0 font-mono">${b.isbn}</div>
                </div>
            `).join('');
        }

        function filter() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = books.filter(b => 
                b.title.toLowerCase().includes(q) || 
                b.author.toLowerCase().includes(q) ||
                b.isbn.includes(q)
            );
            render(filtered);
        }

        // Maintain theme consistency
        const currentTheme = localStorage.getItem('te_theme');
        if (currentTheme === 'dark') document.body.setAttribute('data-theme', 'dark');

        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('te_theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('te_theme', 'dark');
            }
        }

        init();
    </script>
</body>
</html>
