<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library_DB | Terabyte_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --text: #000000; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --text: #ffffff; --border: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }
        .book-row { border-bottom: 2px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 150px; padding: 10px 0; }
    </style>
</head>
<body class="p-8 md:p-20">

    <header class="max-w-5xl mx-auto mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter">LIBRARY_ARCHIVE.EXE</h1>
        <input type="text" id="search" onkeyup="filter()" placeholder="SEARCH_COLLECTION..." class="w-full mt-6 p-4 border-4 border-[var(--border)] bg-transparent font-bold outline-none">
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="book-row border-t-4 border-black font-black uppercase text-xs bg-black text-white px-2">
            <div>Title</div><div>Author</div><div>ISBN</div>
        </div>
        <div id="list-target">Loading_Archive...</div>
    </main>

    <script>
        let books = [];

        async function init() {
            try {
                // Pulls the data from your GitHub file
                const resp = await fetch('library.json');
                books = await resp.json();
                render(books);
            } catch (e) {
                document.getElementById('list-target').innerText = "FAILED_TO_LOAD_JSON";
            }
        }

        function render(data) {
            document.getElementById('list-target').innerHTML = data.map(b => `
                <div class="book-row px-2">
                    <div class="font-bold">${b.title}</div>
                    <div class="opacity-70">${b.author}</div>
                    <div class="text-xs">${b.isbn}</div>
                </div>
            `).join('');
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            render(books.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)));
        }

        init();
    </script>
</body>
</html>
