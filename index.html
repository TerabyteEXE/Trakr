<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terabyte_EXE | App Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --text: #000000; --border: #000000; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* THE RGB EFFECT - Only for the title */
        .rgb-title {
            text-shadow: 
                -3px -1.5px 0px #ff0000, 
                 3px  1.5px 0px #00ffff;
            transition: text-shadow 0.15s ease-in-out;
        }

        .rgb-title:hover {
            text-shadow: 
                -5px -2px 0px #ff00ff, 
                 5px  2px 0px #00ff00;
        }

        .blocky-card { 
            background: white; 
            border: 4px solid var(--border); 
            box-shadow: 8px 8px 0px var(--border);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .blocky-card:hover { 
            transform: translate(-2px, -2px); 
            box-shadow: 10px 10px 0px var(--border); 
        }

        .btn-link {
            background: var(--text);
            color: var(--bg);
            padding: 12px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            display: block;
            border: 2px solid var(--text);
            transition: all 0.1s;
        }

        .btn-link:hover {
            background: var(--bg);
            color: var(--text);
        }
    </style>
</head>
<body class="p-8 md:p-20">

    <header class="max-w-4xl mx-auto mb-16 border-b-8 border-black pb-8">
        <h1 class="text-6xl font-black tracking-tighter italic rgb-title">TERABYTE_EXE</h1>
        <p class="font-mono uppercase tracking-[0.5em] opacity-60 mt-4">Utility Software Archive // v1.5.2</p>
    </header>

    <main class="max-w-4xl mx-auto grid md:grid-cols-2 gap-12">
        
        <div class="blocky-card p-8 flex flex-col justify-between">
            <div>
                <span class="text-[10px] font-mono bg-black text-white px-2 py-1 uppercase">Stable</span>
                <h2 class="text-3xl font-black mt-4 mb-2">DG_Trakr</h2>
                <p class="text-sm opacity-70 mb-6">Beautiful disc golf score tracking.</p>
            </div>
            <a href="./dg-trakr/dg-trakr.html" class="btn-link">Initialize_Trakr</a>
        </div>

        <div class="blocky-card p-8 flex flex-col justify-between">
            <div>
                <span class="text-[10px] font-mono bg-black text-white px-2 py-1 uppercase">WIP</span>
                <h2 class="text-3xl font-black mt-4 mb-2">Flipper</h2>
                <p class="text-sm opacity-70 mb-6">Flip a coin.</p>
            </div>
            <a href="./flipper/flipper.html" class="btn-link">Initialize_Flip</a>
        </div>

        <div class="blocky-card p-8 border-dashed opacity-50 flex items-center justify-center">
            <p class="font-mono text-sm uppercase">[ Slot Available ]</p>
        </div>

    </main>

    <footer class="max-w-4xl mx-auto mt-20 font-mono text-[10px] uppercase opacity-40">
        By Terabyte_EXE
    </footer>

</body>
</html>
