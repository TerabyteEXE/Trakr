<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DG_Trakr | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .view-step { display: none; }
        .view-step.active { display: block; }
        
        /* Tactical Score Display */
        .score-display {
            font-size: 6rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -0.05em;
        }
        
        .hole-chip {
            background: var(--te-bg);
            border: 1px solid var(--te-border);
            padding: 4px;
            text-align: center;
        }

        /* Registration Input Override */
        #new-name {
            background: transparent;
            border-bottom: 2px solid var(--te-border);
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <p class="label">Module: Athletics_01</p>
            <h1 class="text-xl font-bold italic">DG_TRAKR.EXE</h1>
        </div>
        <div class="flex gap-4">
            <div class="text-right">
                <p class="label">System_Status</p>
                <p class="value" id="sys-status">STANDBY</p>
            </div>
            <button class="te-key orange" onclick="toggleTheme()" aria-label="Toggle Theme"></button>
        </div>
    </header>

    <main class="te-grid">
        <section id="setup-view" class="view-step active md:col-span-2">
            <div class="te-panel max-w-md mx-auto">
                <div>
                    <p class="label">Registration_Port</p>
                    <div id="player-setup-list" class="space-y-2 mt-4 mb-6"></div>
                    <div class="flex gap-2">
                        <input id="new-name" type="text" placeholder="PLAYER NAME" class="flex-1 text-sm uppercase">
                        <button onclick="addPlayer()" class="te-key">ADD</button>
                    </div>
                </div>
                <div class="mt-10">
                    <button onclick="startRound()" class="te-key orange w-full !h-16 text-lg">INITIALIZE_ROUND</button>
                </div>
            </div>
        </section>

        <section id="game-view" class="view-step md:col-span-3">
            <div class="grid lg:grid-cols-2 gap-4">
                <div class="te-panel">
                    <div id="player-selector" class="flex flex-wrap gap-2 mb-6 border-b border-black pb-4"></div>
                    
                    <div id="par-prompter" class="mb-4 bg-neutral-200 p-4 rounded hidden text-center">
                        <p class="label">Set Par // Hole <span id="current-h-num">1</span></p>
                        <div class="flex items-center justify-center gap-6 mt-2">
                            <button onclick="adjPar(-1)" class="te-key">[-]</button>
                            <span id="par-val" class="text-3xl font-bold">3</span>
                            <button onclick="adjPar(1)" class="te-key">[+]</button>
                        </div>
                    </div>

                    <div id="scorer-ui" class="text-center py-6 border-y border-black border-dashed my-4">
                        <p id="target-name" class="label !opacity-100 font-bold text-lg mb-4">SELECT PLAYER</p>
                        <div class="flex items-center justify-center gap-8">
                            <button onclick="adjScore(-1)" class="te-key !h-16 !w-16 text-2xl">[-]</button>
                            <span id="stroke-count" class="score-display">3</span>
                            <button onclick="adjScore(1)" class="te-key !h-16 !w-16 text-2xl">[+]</button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <button onclick="logScore()" class="te-key orange w-full !h-12">COMMIT_SCORE</button>
                        <button onclick="finishRound()" class="label w-full hover:opacity-100 transition">FINALIZE ARCHIVE</button>
                    </div>
                </div>

                <div class="te-panel overflow-x-auto">
                    <p class="label">Master_Ledger</p>
                    <div id="ledger-content" class="space-y-6 mt-4"></div>
                </div>
            </div>
        </section>

        <section id="summary-view" class="view-step md:col-span-2">
            <div class="te-panel max-w-2xl mx-auto">
                <div class="text-center border-b border-black pb-6 mb-6">
                    <p class="label">Closing_Statement</p>
                    <h2 class="text-4xl font-bold italic uppercase tracking-tighter">Round_Complete</h2>
                    <p id="final-date" class="label mt-2"></p>
                </div>
                <div id="awards-grid" class="grid grid-cols-2 gap-4 mb-8"></div>
                <div id="final-standings" class="space-y-1 mb-8"></div>
                <button onclick="resetApp()" class="te-key orange w-full !h-12">ARCHIVE & NEW SESSION</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="flex gap-10">
            <div>
                <p class="label">Version</p>
                <p class="text-[10px] mt-1">1.8.2-STABLE</p>
            </div>
            <div>
                <p class="label">Developer</p>
                <p class="text-[10px] mt-1">TERABYTE_EXE</p>
            </div>
        </div>
        <button onclick="resetApp()" class="te-key !h-6 !w-auto px-4 !bg-red-500 !text-white !border-red-600 text-[9px]">HARD_RESET</button>
    </footer>

    <script>
        // Core Logic Preserved
        let state = JSON.parse(localStorage.getItem('dg_ledger')) || { players: [], pars: [], activeIdx: null, isLive: false, isFinished: false };
        let tempScore = 3; let tempPar = 3;

        function init() {
            const savedTheme = localStorage.getItem('te_theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            
            if (state.isFinished) { showView('summary-view'); renderSummary(); }
            else if (state.isLive) { 
                showView('game-view'); 
                document.getElementById('sys-status').innerText = "LIVE_DATA";
                renderGame(); 
                selectPlayer(state.activeIdx || 0); 
            }
            else { renderSetup(); }
        }

        function showView(id) { 
            document.querySelectorAll('.view-step').forEach(v => v.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function save() { localStorage.setItem('dg_ledger', JSON.stringify(state)); }

        function addPlayer() {
            const input = document.getElementById('new-name');
            if (!input.value.trim()) return;
            state.players.push({ name: input.value.trim().toUpperCase(), scores: [] });
            input.value = ''; renderSetup(); save();
        }

        function renderSetup() {
            const list = document.getElementById('player-setup-list');
            list.innerHTML = state.players.map((p, i) => `
                <div class="flex justify-between items-center bg-white border border-black p-2">
                    <span class="text-xs font-bold font-mono">${p.name}</span>
                    <button onclick="removePlayer(${i})" class="text-red-500 text-[9px] font-bold">REMOVE</button>
                </div>`).join('');
        }

        function removePlayer(i) { state.players.splice(i, 1); renderSetup(); save(); }

        function startRound() { 
            if (state.players.length === 0) return; 
            state.isLive = true; 
            document.getElementById('sys-status').innerText = "LIVE_DATA";
            showView('game-view'); 
            selectPlayer(0); 
            save(); 
        }

        function selectPlayer(idx) {
            state.activeIdx = idx; 
            const p = state.players[idx]; 
            const hIdx = p.scores.length;
            if (state.pars[hIdx] === undefined) {
                document.getElementById('par-prompter').classList.remove('hidden');
                document.getElementById('current-h-num').innerText = hIdx + 1;
                tempPar = 3; document.getElementById('par-val').innerText = tempPar;
            } else { 
                document.getElementById('par-prompter').classList.add('hidden'); 
                tempPar = state.pars[hIdx]; 
            }
            tempScore = tempPar; 
            document.getElementById('target-name').innerText = p.name;
            document.getElementById('stroke-count').innerText = tempScore; 
            renderGame();
        }

        function adjPar(v) { tempPar = Math.max(1, tempPar + v); document.getElementById('par-val').innerText = tempPar; tempScore = tempPar; document.getElementById('stroke-count').innerText = tempPar; }
        function adjScore(v) { tempScore = Math.max(1, tempScore + v); document.getElementById('stroke-count').innerText = tempScore; }

        function logScore() {
            if (state.activeIdx === null) return;
            const p = state.players[state.activeIdx];
            if (state.pars[p.scores.length] === undefined) state.pars[p.scores.length] = tempPar;
            p.scores.push(tempScore);
            let nextIdx = (state.activeIdx + 1) % state.players.length;
            save(); selectPlayer(nextIdx);
        }

        function renderGame() {
            const chips = document.getElementById('player-selector');
            chips.innerHTML = state.players.map((p, i) => `
                <button onclick="selectPlayer(${i})" class="te-key !w-auto px-4 !h-8 ${state.activeIdx === i ? 'orange' : ''}">${p.name}</button>
            `).join('');
            
            const ledger = document.getElementById('ledger-content');
            ledger.innerHTML = state.players.map((p, pIdx) => {
                let total = p.scores.reduce((a, b) => a + b, 0);
                let parTotal = p.scores.reduce((acc, _, i) => acc + (state.pars[i] || 0), 0);
                let rel = total - parTotal;
                return `
                <div class="mb-4">
                    <div class="flex justify-between items-baseline border-b border-black mb-2">
                        <p class="font-bold">${p.name}</p>
                        <p class="text-xl font-bold">${rel > 0 ? '+' : ''}${rel}</p>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${p.scores.map((s, i) => `
                            <div class="hole-chip" onclick="editHole(${pIdx}, ${i})">
                                <p class="text-[8px] opacity-50">H${i+1}</p>
                                <p class="font-bold">${s}</p>
                            </div>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function finishRound() { state.isFinished = true; showView('summary-view'); renderSummary(); save(); }

        function renderSummary() {
            document.getElementById('final-date').innerText = new Date().toLocaleDateString();
            const stats = state.players.map(p => {
                const total = p.scores.reduce((a, b) => a + b, 0);
                const parTotal = p.scores.reduce((acc, _, i) => acc + (state.pars[i] || 0), 0);
                const birdies = p.scores.filter((s, i) => s < state.pars[i]).length;
                return { name: p.name, rel: total - parTotal, total, birdies };
            });
            const winner = [...stats].sort((a,b) => a.rel - b.rel)[0];
            const sniper = [...stats].sort((a,b) => b.birdies - a.birdies)[0];
            
            document.getElementById('awards-grid').innerHTML = `
                <div class="te-panel bg-neutral-100 !min-h-0">
                    <p class="label">Top Gun</p>
                    <p class="font-bold">${winner.name}</p>
                </div>
                <div class="te-panel bg-neutral-100 !min-h-0">
                    <p class="label">Birdies</p>
                    <p class="font-bold">${sniper.name}</p>
                </div>`;
            
            document.getElementById('final-standings').innerHTML = stats.sort((a,b) => a.rel - b.rel).map((s, i) => `
                <div class="flex justify-between font-mono text-[10px] py-1 border-b border-black">
                    <span>${i + 1}. ${s.name}</span>
                    <span class="font-bold">${s.rel > 0 ? '+' : ''}${s.rel} (${s.total})</span>
                </div>`).join('');
        }

        function editHole(pIdx, hIdx) { 
            const val = prompt("Correct Strokes:", state.players[pIdx].scores[hIdx]); 
            if (val && !isNaN(val)) { state.players[pIdx].scores[hIdx] = parseInt(val); save(); renderGame(); } 
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            localStorage.setItem('te_theme', next);
            document.body.setAttribute('data-theme', next);
        }

        function resetApp() { if(confirm("ARCHIVE LEDGER?")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</html>
