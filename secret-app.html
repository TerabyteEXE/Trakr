<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset_Encoder | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --card: #ffffff; --text: #000000; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --card: #1a1a1a; --text: #ffffff; --border: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .blocky-card { background: var(--card); border: 4px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
        .btn-link { background: var(--text); color: var(--bg); border: 2px solid var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        input, select { background: transparent; border: 2px solid var(--border); padding: 8px; font-family: 'JetBrains Mono'; width: 100%; margin-bottom: 12px; font-size: 13px; }
        textarea { background: #000; color: #4ade80; font-family: 'JetBrains Mono'; padding: 15px; width: 100%; height: 280px; font-size: 12px; border: 4px solid var(--border); line-height: 1.5; outline: none; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">
        
        <div class="blocky-card p-6">
            <h2 class="text-2xl font-black italic mb-6 border-b-4 border-black inline-block uppercase">Asset_Encoder</h2>
            
            <label class="block text-[10px] font-mono mb-1 uppercase opacity-60 text-[var(--text)]">Disc Name</label>
            <input type="text" id="name" placeholder="e.g. Uplink" oninput="generateCode()">
            
            <label class="block text-[10px] font-mono mb-1 uppercase opacity-60">Brand</label>
            <input type="text" id="brand" placeholder="e.g. MVP" oninput="generateCode()">

            <label class="block text-[10px] font-mono mb-1 uppercase opacity-60">Type</label>
            <select id="type" onchange="generateCode()">
                <option value="Putter">Putter</option>
                <option value="Midrange">Midrange</option>
                <option value="Fairway Driver">Fairway Driver</option>
                <option value="Distance Driver">Distance Driver</option>
            </select>
            
            <label class="block text-[10px] font-mono mb-1 uppercase opacity-60">Image URL</label>
            <input type="text" id="img" placeholder="https://..." oninput="generateCode()">
            
            <div class="grid grid-cols-4 gap-2 mt-2">
                <div><label class="text-[8px] font-mono opacity-60">SPD</label><input type="text" id="s" placeholder="5" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono opacity-60">GLD</label><input type="text" id="g" placeholder="5" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono opacity-60">TRN</label><input type="text" id="t" placeholder="-3" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono opacity-60">FDE</label><input type="text" id="f" placeholder="0.5" oninput="generateCode()"></div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <h3 class="font-mono text-xs uppercase opacity-60 italic">Array_Buffer_Object:</h3>
            <textarea id="output" readonly></textarea>
            <button onclick="copyCode()" class="btn-link py-4">Copy_Object_to_Clipboard</button>
            <p class="text-[10px] font-mono opacity-50 uppercase text-center leading-relaxed">
                Paste inside the [ ] of your "const myDiscs" array
            </p>
        </div>

    </div>

    <script>
        function generateCode() {
            const name = document.getElementById('name').value || "Asset_Name";
            const brand = document.getElementById('brand').value || "Manufacturer";
            const type = document.getElementById('type').value;
            const img = document.getElementById('img').value || "IMG_URL";
            
            // Clean numbers
            const s = parseFloat(document.getElementById('s').value) || 0;
            const g = parseFloat(document.getElementById('g').value) || 0;
            const t = parseFloat(document.getElementById('t').value) || 0;
            const f = parseFloat(document.getElementById('f').value) || 0;

            const objectTemplate = `{
    name: "${name}",
    type: "${type}",
    brand: "${brand}",
    stats: [${s}, ${g}, ${t}, ${f}],
    img: "${img}"
},`;

            document.getElementById('output').value = objectTemplate;
        }

        function copyCode() {
            const copyText = document.getElementById("output");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            
            // Visual feedback
            const btn = document.querySelector('.btn-link');
            const original = btn.innerText;
            btn.innerText = "BUFFER_COPIED";
            setTimeout(() => btn.innerText = original, 1000);
        }

        // Initialize
        generateCode();
        document.documentElement.setAttribute('data-theme', localStorage.getItem('dg_theme') || 'light');
    </script>
</body>
</html>
