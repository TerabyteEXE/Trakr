<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret App| TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --card: #ffffff; --text: #000000; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --card: #1a1a1a; --text: #ffffff; --border: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        .blocky-card { background: var(--card); border: 4px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
        .btn-link { background: var(--text); color: var(--bg); border: 2px solid var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        input { background: transparent; border: 2px solid var(--border); padding: 8px; font-family: 'JetBrains Mono'; width: 100%; margin-bottom: 10px; }
        textarea { background: #000; color: #00ff00; font-family: 'JetBrains Mono'; padding: 15px; width: 100%; height: 300px; font-size: 12px; border: 4px solid var(--border); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-10">
        
        <div class="blocky-card p-6">
            <h2 class="text-2xl font-black italic mb-6 border-b-4 border-black inline-block">ASSET_DATA_ENTRY</h2>
            
            <label class="block text-[10px] font-mono mb-1 uppercase">Disc Name</label>
            <input type="text" id="name" placeholder="e.g. Destroyer" oninput="generateCode()">
            
            <label class="block text-[10px] font-mono mb-1 uppercase">Brand & Plastic</label>
            <input type="text" id="details" placeholder="e.g. Innova // Star" oninput="generateCode()">
            
            <label class="block text-[10px] font-mono mb-1 uppercase">Image URL (Direct link)</label>
            <input type="text" id="img" placeholder="https://m.media-amazon.com/..." oninput="generateCode()">
            
            <div class="grid grid-cols-4 gap-2 mt-4">
                <div><label class="text-[8px] font-mono">SPD</label><input type="text" id="s" placeholder="12" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono">GLD</label><input type="text" id="g" placeholder="5" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono">TRN</label><input type="text" id="t" placeholder="-1" oninput="generateCode()"></div>
                <div><label class="text-[8px] font-mono">FDE</label><input type="text" id="f" placeholder="3" oninput="generateCode()"></div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <h3 class="font-mono text-xs uppercase opacity-60">Generated_Source_Code:</h3>
            <textarea id="output" readonly></textarea>
            <button onclick="copyCode()" class="btn-link py-4">Copy_to_Clipboard</button>
            <p class="text-[10px] font-mono opacity-50 uppercase text-center">Paste this code into your archive.html file</p>
        </div>

    </div>

    <script>
        function generateCode() {
            const name = document.getElementById('name').value || "DISC_NAME";
            const details = document.getElementById('details').value || "BRAND // PLASTIC";
            const img = document.getElementById('img').value || "IMAGE_URL";
            const s = document.getElementById('s').value || "0";
            const g = document.getElementById('g').value || "0";
            const t = document.getElementById('t').value || "0";
            const f = document.getElementById('f').value || "0";

            const template = `<div class="blocky-card flex flex-col group">
    <div class="h-64 bg-white flex items-center justify-center border-b-4 border-black">
        <img src="${img}" class="disc-img h-full w-full object-contain p-4 grayscale group-hover:grayscale-0 transition-all" alt="${name}">
    </div>
    <div class="p-6">
        <h2 class="text-2xl font-black italic uppercase leading-none">${name}</h2>
        <p class="font-mono text-[10px] opacity-60 mt-1">${details}</p>
        <div class="grid grid-cols-4 gap-2 mt-6 font-mono text-center">
            <div class="border-2 border-black py-1"><div class="text-[8px] opacity-50">SPD</div><div class="font-black text-lg">${s}</div></div>
            <div class="border-2 border-black py-1"><div class="text-[8px] opacity-50">GLD</div><div class="font-black text-lg">${g}</div></div>
            <div class="border-2 border-black py-1"><div class="text-[8px] opacity-50">TRN</div><div class="font-black text-lg">${t}</div></div>
            <div class="border-2 border-black py-1"><div class="text-[8px] opacity-50">FDE</div><div class="font-black text-lg">${f}</div></div>
        </div>
    </div>
</div>
`;

            document.getElementById('output').value = template;
        }

        function copyCode() {
            const copyText = document.getElementById("output");
            copyText.select();
            document.execCommand("copy");
            alert("CODE_COPIED");
        }

        // Run once on load
        generateCode();
    </script>
</body>
</html>
