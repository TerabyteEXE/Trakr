<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DG Tracker | Keep On Trak!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --card: #ffffff; --text: #000000; --accent: #2d5a27; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --card: #1a1a1a; --text: #ffffff; --accent: #4ade80; --border: #ffffff; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: none; }
        .blocky-card { background: var(--card); border: 3px solid var(--border); border-radius: 0px; box-shadow: 6px 6px 0px var(--border); }
        .btn-solid { background: var(--text); color: var(--bg); border: 2px solid var(--text); font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.1s; }
        .btn-solid:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-outline { background: transparent; color: var(--text); border: 2px solid var(--text); font-weight: 900; text-transform: uppercase; }
        .view-step { display: none; }
        .view-step.active { display: block; }
        input { background: transparent; border-bottom: 2px solid var(--border); outline: none; }
        .ledger-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-start border-b-4 border-[var(--border)] pb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter leading-none">DG_Trakr</h1>
            <p class="font-mono text-[10px] uppercase mt-2 tracking-[0.3em] opacity-50">Disc Golf Tracking Made Easy!!</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="btn-outline px-3 py-1 text-xs">Mode</button>
            <button onclick="resetApp()" class="btn-solid bg-red-600 border-red-600 px-3 py-1 text-xs text-white">Reset</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <section id="setup-view" class="view-step active">
            <div class="max-w-md mx-auto space-y-8">
                <div class="blocky-card p-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-40">Registration</h2>
                    <div id="player-setup-list" class="space-y-3 mb-6"></div>
                    <div class="flex gap-2">
                        <input id="new-name" type="text" placeholder="PLAYER NAME" class="flex-1 font-bold p-2">
                        <button onclick="addPlayer()" class="btn-solid px-6 py-2">Add</button>
                    </div>
                </div>
                <button onclick="startRound()" class="btn-solid w-full py-6 text-xl shadow-[8px_8px_0px_#2d5a27]">Initialize Round</button>
            </div>
        </section>

        <section id="game-view" class="view-step">
            <div class="grid lg:grid-cols-[400px_1fr] gap-10">
                <div class="space-y-6">
                    <div class="blocky-card p-6">
                        <div id="player-selector" class="flex flex-wrap gap-2 mb-6"></div>
                        <div id="par-prompter" class="mb-6 bg-[var(--text)] text-[var(--bg)] p-4 hidden">
                            <p class="text-[10px] font-bold uppercase mb-2 text-center">Set Par for Hole <span id="current-h-num">1</span></p>
                            <div class="flex items-center justify-around">
                                <button onclick="adjPar(-1)" class="text-3xl font-black"> [−] </button>
                                <span id="par-val" class="text-4xl font-black">3</span>
                                <button onclick="adjPar(1)" class="text-3xl font-black"> [+] </button>
                            </div>
                        </div>
                        <div id="scorer-ui" class="text-center py-10 border-2 border-[var(--border)] mb-6">
                            <p id="target-name" class="text-xl font-black uppercase mb-1">Select Player</p>
                            <div class="flex items-center justify-center gap-10">
                                <button onclick="adjScore(-1)" class="text-4xl font-black"> [−] </button>
                                <span id="stroke-count" class="text-8xl font-black font-mono">3</span>
                                <button onclick="adjScore(1)" class="text-4xl font-black"> [+] </button>
                            </div>
                        </div>
                        <button onclick="logScore()" class="btn-solid w-full py-4 text-lg">Commit to Tracker</button>
                        <button onclick="finishRound()" class="w-full mt-4 text-[10px] font-bold uppercase tracking-widest opacity-30 hover:opacity-100 transition">Seal Tracker & Finish</button>
                    </div>
                </div>
                <div class="blocky-card p-6 overflow-x-auto">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest opacity-40 mb-6">Master Tracker</h3>
                    <div id="ledger-content" class="space-y-10"></div>
                </div>
            </div>
        </section>

        <section id="summary-view" class="view-step">
            <div class="max-w-2xl mx-auto blocky-card p-10 space-y-8 bg-[var(--card)]">
                <div class="text-center border-b-4 border-[var(--border)] pb-6">
                    <h2 class="text-5xl font-black tracking-tighter uppercase">Closing Statement</h2>
                    <p id="final-date" class="font-mono text-xs opacity-50 mt-2 uppercase"></p>
                </div>
                <div id="awards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div id="final-standings" class="space-y-2"></div>
                <button onclick="resetApp()" class="btn-solid w-full py-4">Archive & Start New</button>
            </div>
        </section>
    </main>

    <script>
        let state = JSON.parse(localStorage.getItem('dg_ledger')) || { players: [], pars: [], activeIdx: null, isLive: false, isFinished: false, theme: 'light' };
        let tempScore = 3; let tempPar = 3;

        function init() {
            document.documentElement.setAttribute('data-theme', state.theme);
            if (state.isFinished) { showView('summary-view'); renderSummary(); }
            else if (state.isLive) { showView('game-view'); renderGame(); selectPlayer(state.activeIdx || 0); }
            else { renderSetup(); }
        }

        function showView(id) { document.querySelectorAll('.view-step').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function save() { localStorage.setItem('dg_ledger', JSON.stringify(state)); }
        function addPlayer() {
            const input = document.getElementById('new-name');
            if (!input.value.trim()) return;
            state.players.push({ name: input.value.trim().toUpperCase(), scores: [] });
            input.value = ''; renderSetup(); save();
        }
        function renderSetup() {
            const list = document.getElementById('player-setup-list');
            list.innerHTML = state.players.map((p, i) => `<div class="flex justify-between items-center border-b border-[var(--border)] py-2"><span class="font-bold font-mono">${p.name}</span><button onclick="state.players.splice(${i},1); renderSetup(); save();" class="text-xs opacity-40 font-bold uppercase">Remove</button></div>`).join('');
        }
        function startRound() { if (state.players.length === 0) return; state.isLive = true; showView('game-view'); selectPlayer(0); save(); }
        function selectPlayer(idx) {
            state.activeIdx = idx; const p = state.players[idx]; const hIdx = p.scores.length;
            if (state.pars[hIdx] === undefined) {
                document.getElementById('par-prompter').classList.remove('hidden');
                document.getElementById('current-h-num').innerText = hIdx + 1;
                tempPar = 3; document.getElementById('par-val').innerText = tempPar;
            } else { document.getElementById('par-prompter').classList.add('hidden'); tempPar = state.pars[hIdx]; }
            tempScore = tempPar; document.getElementById('target-name').innerText = p.name;
            document.getElementById('stroke-count').innerText = tempScore; renderGame();
        }
        function adjPar(v) { tempPar = Math.max(1, tempPar + v); document.getElementById('par-val').innerText = tempPar; tempScore = tempPar; document.getElementById('stroke-count').innerText = tempScore; }
        function adjScore(v) { tempScore = Math.max(1, tempScore + v); document.getElementById('stroke-count').innerText = tempScore; }
        function logScore() {
            if (state.activeIdx === null) return;
            const p = state.players[state.activeIdx];
            if (state.pars[p.scores.length] === undefined) state.pars[p.scores.length] = tempPar;
            p.scores.push(tempScore);
            let nextIdx = (state.activeIdx + 1) % state.players.length;
            save(); selectPlayer(nextIdx);
        }
        function renderGame() {
            const chips = document.getElementById('player-selector');
            chips.innerHTML = state.players.map((p, i) => `<button onclick="selectPlayer(${i})" class="btn-outline px-4 py-2 text-xs ${state.activeIdx === i ? 'bg-[var(--text)] text-[var(--bg)]' : ''}">${p.name}</button>`).join('');
            const ledger = document.getElementById('ledger-content');
            ledger.innerHTML = state.players.map((p, pIdx) => {
                let total = p.scores.reduce((a, b) => a + b, 0);
                let parTotal = p.scores.reduce((acc, _, i) => acc + (state.pars[i] || 0), 0);
                let rel = total - parTotal;
                return `<div class="space-y-4"><div class="flex justify-between items-baseline border-b-2 border-[var(--border)]"><h4 class="text-2xl font-black">${p.name}</h4><span class="text-4xl font-mono font-black ${rel <= 0 ? 'text-[var(--accent)]' : 'text-red-500'}">${rel > 0 ? '+' : ''}${rel === 0 ? 'E' : rel}</span></div><div class="ledger-grid">${state.pars.map((par, i) => `<div onclick="editHole(${pIdx}, ${i})" class="border border-[var(--border)] p-1 text-center ${!p.scores[i] ? 'opacity-10' : ''}"><div class="text-[7px] font-mono opacity-50">H${i+1}</div><div class="text-[8px] font-mono opacity-30">P${par}</div><div class="font-bold text-sm">${p.scores[i] || '-'}</div></div>`).join('')}</div></div>`;
            }).join('');
        }
        function finishRound() { state.isFinished = true; showView('summary-view'); renderSummary(); save(); }
        function renderSummary() {
            document.getElementById('final-date').innerText = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const stats = state.players.map(p => {
                const total = p.scores.reduce((a, b) => a + b, 0);
                const parTotal = p.scores.reduce((acc, _, i) => acc + (state.pars[i] || 0), 0);
                const birdies = p.scores.filter((s, i) => s < state.pars[i]).length;
                const pars = p.scores.filter((s, i) => s === state.pars[i]).length;
                return { name: p.name, rel: total - parTotal, total, birdies, pars };
            });
            const winner = [...stats].sort((a,b) => a.rel - b.rel)[0];
            const sniper = [...stats].sort((a,b) => b.birdies - a.birdies)[0];
            const anchor = [...stats].sort((a,b) => b.pars - a.pars)[0];
            document.getElementById('awards-grid').innerHTML = `
                <div class="border-2 border-[var(--border)] p-4"><p class="text-[10px] uppercase font-bold opacity-40">Top Gun</p><p class="text-2xl font-black">${winner.name}</p><p class="text-xs opacity-60">Score: ${winner.rel <= 0 ? winner.rel : '+'+winner.rel}</p></div>
                <div class="border-2 border-[var(--border)] p-4"><p class="text-[10px] uppercase font-bold opacity-40">The Sniper</p><p class="text-2xl font-black">${sniper.name}</p><p class="text-xs opacity-60">${sniper.birdies} Birdies</p></div>
                <div class="border-2 border-[var(--border)] p-4"><p class="text-[10px] uppercase font-bold opacity-40">The Anchor</p><p class="text-2xl font-black">${anchor.name}</p><p class="text-xs opacity-60">${anchor.pars} Clean Pars</p></div>
            `;
            document.getElementById('final-standings').innerHTML = stats.sort((a,b) => a.rel - b.rel).map((s, i) => `<div class="flex justify-between font-mono text-sm py-1 border-b border-[var(--border)] opacity-60"><span>${i+1}. ${s.name}</span><span>${s.rel <= 0 ? s.rel : '+'+s.rel} (${s.total})</span></div>`).join('');
        }
        function editHole(pIdx, hIdx) { const val = prompt("Correct Strokes:", state.players[pIdx].scores[hIdx]); if (val && !isNaN(val)) { state.players[pIdx].scores[hIdx] = parseInt(val); save(); renderGame(); } }
        function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; init(); save(); }
        function resetApp() { if(confirm("ARCHIVE LEDGER?")) { localStorage.clear(); location.reload(); } }
        init();
    </script>
</body>
</body>
	<meta
    	info
       
</html>
