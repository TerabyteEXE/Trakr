<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic_Tac_Toe | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f2f2f0; --card: #ffffff; --text: #000000; --border: #000000; }
        [data-theme='dark'] { --bg: #111111; --card: #1a1a1a; --text: #ffffff; --border: #ffffff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.2s, color 0.2s; }
        .blocky-card { background: var(--card); border: 4px solid var(--border); box-shadow: 8px 8px 0px var(--border); }
        .btn-link { background: var(--text); color: var(--bg); border: 2px solid var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 800; text-transform: uppercase; transition: all 0.1s; }
        .btn-link:hover { background: var(--bg); color: var(--text); }

        /* THE GAME BOARD GRID */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .ttt-cell {
            background: var(--card);
            border: 4px solid var(--border);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
        }

        .ttt-cell:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border);
        }

        .ttt-cell:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        .symbol-x {
            color: #ff0055; /* Tech Red */
            text-shadow: 2px 2px 0px var(--border);
        }

        .symbol-o {
            color: #00ffff; /* Cyber Cyan */
            text-shadow: 2px 2px 0px var(--border);
        }

        /* WINNING LINE ANIMATION */
        .ttt-cell.winning-cell {
            background: var(--text);
            animation: glitch-blink 0.2s steps(2) infinite;
        }

        @keyframes glitch-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95) skew(2deg); }
        }
    </style>
</head>
<body class="p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="blocky-card p-8 w-full max-w-sm">
        <header class="mb-8 border-b-4 border-[var(--border)] pb-4 flex justify-between items-start gap-4">
            <div>
                <h1 class="text-3xl font-black italic">X_O_PROTOCOL</h1>
                <p class="font-mono text-[10px] uppercase opacity-50 mt-1">Noughts & Crosses // v0.9.1</p>
            </div>
            <a href="../index.html" class="btn-link !py-1 !px-3 text-[10px] mt-1 whitespace-nowrap">Home_Exit</a>
        </header>

        <div class="font-mono text-sm uppercase mb-6 text-center tracking-wider" id="status">
            Active Turn: <span class="font-bold symbol-x" id="turnIndicator">X</span>
        </div>

        <div class="ttt-grid" id="board">
            <div class="ttt-cell" onclick="handleCellClick(0)"></div>
            <div class="ttt-cell" onclick="handleCellClick(1)"></div>
            <div class="ttt-cell" onclick="handleCellClick(2)"></div>
            <div class="ttt-cell" onclick="handleCellClick(3)"></div>
            <div class="ttt-cell" onclick="handleCellClick(4)"></div>
            <div class="ttt-cell" onclick="handleCellClick(5)"></div>
            <div class="ttt-cell" onclick="handleCellClick(6)"></div>
            <div class="ttt-cell" onclick="handleCellClick(7)"></div>
            <div class="ttt-cell" onclick="handleCellClick(8)"></div>
        </div>

        <button onclick="resetGame()" class="btn-link w-full py-3 mt-8 text-sm">Initialize_Reset</button>
    </div>

    <script>
        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];
        const statusDisplay = document.getElementById('status');
        const turnIndicator = document.getElementById('turnIndicator');
        const cells = document.querySelectorAll('.ttt-cell');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]  // Diagonals
        ];

        function handleCellClick(cellIndex) {
            if (gameState[cellIndex] !== "" || !gameActive) return;

            gameState[cellIndex] = currentPlayer;
            updateCellDisplay(cellIndex);
            checkResult();
        }

        function updateCellDisplay(index) {
            const symbol = currentPlayer;
            cells[index].innerHTML = `<span class="text-6xl font-black ${symbol === 'X' ? 'symbol-x' : 'symbol-o'}">${symbol}</span>`;
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = null;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = winningConditions[i];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                statusDisplay.innerHTML = `Data Corrupted. <span class="font-bold ${currentPlayer === 'X' ? 'symbol-x' : 'symbol-o'}">${currentPlayer}</span> Gains Control.`;
                highlightWin(winningLine);
                return;
            }

            if (!gameState.includes("")) {
                gameActive = false;
                statusDisplay.innerHTML = "Draw. Grid Neutralized.";
                return;
            }

            // Switch Player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            turnIndicator.innerText = currentPlayer;
            turnIndicator.className = `font-bold ${currentPlayer === 'X' ? 'symbol-x' : 'symbol-o'}`;
        }

        function highlightWin(line) {
            line.forEach(index => {
                cells[index].classList.add('winning-cell');
            });
        }

        function resetGame() {
            gameActive = true;
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            
            // Re-render initial status
            statusDisplay.innerHTML = `Active Turn: <span class="font-bold symbol-x" id="turnIndicator">X</span>`;
            
            // Redefine reference to turnIndicator after innerHTML replace
            const newTurnIndicator = document.getElementById('turnIndicator');
            
            // Clear cells and remove classes
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('winning-cell');
            });
        }

        // Initialize theme and apply it immediately
        const currentTheme = localStorage.getItem('dg_theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</body>
</html>
