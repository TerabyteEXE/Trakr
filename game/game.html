<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic_Tac_Toe | TERABYTE_EXE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* GAME BOARD GRID */
        .ttt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--te-border);
            border: 1px solid var(--te-border);
        }

        .ttt-cell {
            background: var(--te-panel);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
        }

        .ttt-cell:hover { background: var(--te-bg); }

        .symbol-x { color: var(--te-orange); }
        .symbol-o { color: var(--te-text); opacity: 0.8; }

        /* WINNING STATE */
        .ttt-cell.winning-cell {
            background: var(--te-orange) !important;
            animation: glitch-blink 0.2s steps(2) infinite;
        }

        .ttt-cell.winning-cell span { color: white !important; }

        @keyframes glitch-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; transform: skew(1deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="te-grid w-full max-w-sm">
        <header class="te-panel !min-h-0 border-b-0">
            <div class="flex justify-between items-start w-full">
                <div>
                    <p class="label">Logic_Game</p>
                    <h1 class="text-xl font-bold">X_O_PROTOCOL</h1>
                    <p class="label mt-1">Noughts & Crosses // v0.9.1</p>
                </div>
                <a href="../index.html" class="te-key" title="Return Home">←</a>
            </div>
        </header>

        <div class="te-panel !min-h-0">
            <div class="flex justify-between items-center">
                <p class="label">System_Status</p>
                <div class="font-mono text-[10px] uppercase tracking-wider" id="status">
                    Turn: <span class="font-bold symbol-x" id="turnIndicator">X</span>
                </div>
            </div>
        </div>

        <div class="ttt-grid" id="board">
            <div class="ttt-cell" onclick="handleCellClick(0)"></div>
            <div class="ttt-cell" onclick="handleCellClick(1)"></div>
            <div class="ttt-cell" onclick="handleCellClick(2)"></div>
            <div class="ttt-cell" onclick="handleCellClick(3)"></div>
            <div class="ttt-cell" onclick="handleCellClick(4)"></div>
            <div class="ttt-cell" onclick="handleCellClick(5)"></div>
            <div class="ttt-cell" onclick="handleCellClick(6)"></div>
            <div class="ttt-cell" onclick="handleCellClick(7)"></div>
            <div class="ttt-cell" onclick="handleCellClick(8)"></div>
        </div>

        <div class="te-panel !min-h-0 bg-neutral-200">
            <div class="flex justify-between items-center">
                <p class="label">Global_Reset</p>
                <button onclick="resetGame()" class="te-key orange !w-24 !h-8 !rounded-sm text-[10px]">INITIALIZE</button>
            </div>
        </div>
    </div>

    <script>
        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];
        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.ttt-cell');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(cellIndex) {
            if (gameState[cellIndex] !== "" || !gameActive) return;
            gameState[cellIndex] = currentPlayer;
            updateCellDisplay(cellIndex);
            checkResult();
        }

        function updateCellDisplay(index) {
            const symbol = currentPlayer;
            cells[index].innerHTML = `<span class="text-4xl font-bold ${symbol === 'X' ? 'symbol-x' : 'symbol-o'}">${symbol}</span>`;
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = null;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = winningConditions[i];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                statusDisplay.innerHTML = `CORRUPT: <span class="font-bold ${currentPlayer === 'X' ? 'symbol-x' : 'symbol-o'}">${currentPlayer}</span>_WON`;
                highlightWin(winningLine);
                return;
            }

            if (!gameState.includes("")) {
                gameActive = false;
                statusDisplay.innerHTML = "DRAW: GRID_NEUTRAL";
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusDisplay.innerHTML = `Turn: <span class="font-bold ${currentPlayer === 'X' ? 'symbol-x' : 'symbol-o'}" id="turnIndicator">${currentPlayer}</span>`;
        }

        function highlightWin(line) {
            line.forEach(index => {
                cells[index].classList.add('winning-cell');
            });
        }

        function resetGame() {
            gameActive = true;
            currentPlayer = 'X';
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusDisplay.innerHTML = `Turn: <span class="font-bold symbol-x" id="turnIndicator">X</span>`;
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('winning-cell');
            });
        }

        // Theme persistent logic
        const currentTheme = localStorage.getItem('te_theme');
        if (currentTheme === 'dark') document.body.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
